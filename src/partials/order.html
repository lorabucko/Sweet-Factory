<div class="overlay" id="overlay2">
  <div
    class="modal"
    id="contactModal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="contactModalTitle"
    tabindex="-1"
  >
    <button
      class="modal-close"
      type="button"
      id="closeContactBtn"
      aria-label="Закрити"
    ><svg width="32" height="32">
        <use href="/img/sprite.svg#icon-close"></use>
      </svg>
    </button>
    <h2 class="modal-title" id="contactModalTitle">Оформлення замовлення</h2>
      <form id="orderForm" novalidate>
        <div class="form-group" id="group-name">
          <label class="form-label" for="nameInput"
            >Ім'я<span class="req">*</span></label
          >
          <input
            class="form-input"
            id="nameInput"
            name="name"
            type="text"
            placeholder="Вікторія"
            autocomplete="given-name"
          />
          <span class="error-text visible" id="error-name">Ім'я повинно містити від 2 до 48 символів</span>
        </div>

        <div class="form-group" id="group-phone">
          <label class="form-label" for="phoneInput"
            >Телефон<span class="req">*</span></label
          >
          <input
            class="form-input phone-input"
            id="phoneInput"
            name="phone"
            type="tel"
            placeholder="38 0__ ________"
            autocomplete="tel"
          />
          <span class="error-text visible" id="error-phone"
            >Номер телефону повинен містити 12 цифр</span
          >
        </div>

        <div class="form-group" id="group-comment">
          <label class="form-label" for="commentInput"
            >Коментар<span class="req">*</span></label
          >
          <textarea
            class="form-textarea"
            id="commentInput"
            name="comment"
            placeholder="Ваш коментар"
          ></textarea>
          <span class="error-text visible" id="error-comment">Коментар повинен містити від 2 до 256 символів</span>
        </div>

        <button class="btn-submit" type="submit">Надіслати заявку</button>
      </form>

      <div
        class="success-msg"
        id="successMsg"
        style="display: none"
        aria-live="polite"
      >
        <div class="icon">🎉</div>
        <h3>Заявку надіслано!</h3>
        <p>Ми зателефонуємо вам найближчим часом.</p>
      </div>
    </div>
  </div>
</div>
